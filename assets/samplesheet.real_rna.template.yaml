# External/local real-RNA validation template.
# One biological sample appears once, with nested groups and modality blocks.

library_name: REALDATATESTLIB

samples:
  day15:
    groups:
      Normal:
        sb_barcodes: [CAGT, ACGT, GCTA, CGTA]
      Co2:
        sb_barcodes: [GTCA, TGCA, CTGA, TCGA]

    rna:
      reads:
        i1: day15_I1.fq.gz
        r1: day15_R1.fq.gz
        r2: day15_R2.fq.gz
