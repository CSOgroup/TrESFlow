# External/local real-RNA validation template.
# Copy this file next to your local validation inputs, rename it, and keep the relative paths as needed.
# Real data files are expected to remain external/local and are not committed to this repo.
# The example file path keeps the legacy filename `sb_map_RNA.tsv`, but the
# pipeline contract treats it as the shared sample-barcode group map.

library_name: REAL_VALIDATION_LIB
sb_group_map: sb_map_RNA.tsv

samples:
  - id: day15
    modality: rna
    reads:
      i1: day15_I1.fq.gz
      r1: day15_R1.fq.gz
      r2: day15_R2.fq.gz
    barcodes:
      sample:
        bc_len: 4
        bc_start: 0
        hd: 1
        tag: SB
        first_pass: first_pass
        reverse_complement: true
      umi:
        bc_len: 10
        bc_start: 4
        tag: UM
      cell:
        whitelist: ligation_barcode_whitelist.txt
        bc_len: 8
        hd: 1
        tag: CB
