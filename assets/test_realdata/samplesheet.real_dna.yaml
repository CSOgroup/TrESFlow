# Developer validation fixture for the real DNA-only path.

library_name: REALDATATESTLIB

runtime:
  env_prefix: /home/annan/micromamba/envs/tres
  tmpdir: /tmp/TrESFlow_test_real_dna_tmp

references:
  species: human
  root: ../testdata/TrESFlow_References
  ligation_barcode_whitelist: ../testdata/TrESFlow_References/ligation_barcode_whitelist.txt
  dna_ref_dir: ../testdata/TrESFlow_References/dna/human/bwa
  dna_blacklist_bed: ../testdata/TrESFlow_References/dna/human/blacklist.bed
  dna_chrom_sizes: ../testdata/TrESFlow_References/dna/human/chrom.sizes
  dna_effective_genome_size: 12

samples:
  day15:
    groups:
      Normal:
        sb_barcodes: [CAGT, ACGT, GCTA, CGTA]
      Co2:
        sb_barcodes: [GTCA, TGCA, CTGA, TCGA]

    dna:
      reads:
        i1: day15_DNA_I1.fq.gz
        i2: day15_DNA_I2.fq.gz
        r1: day15_DNA_R1.fq.gz
        r2: day15_DNA_R2.fq.gz
      mark_barcodes:
        H3K27me3: AGGCTATA
        H3K27ac: GCCTCTAT
