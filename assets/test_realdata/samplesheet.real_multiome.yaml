# Shared real-data validation example for the current strongest truthful boundary before sc_process.py.
# The sb-group map keeps its legacy on-disk filename `sb_map_RNA.tsv`, but the
# pipeline contract treats it as the shared sample-barcode group map for both RNA and DNA.
library_name: REAL_VALIDATION_LIB_MULTIOME
sb_group_map: sb_map_RNA.tsv
dna_mo_map: mo_map.tsv

samples:
  - id: day15
    modality: rna
    reads:
      i1: day15_I1.fq.gz
      r1: day15_R1.fq.gz
      r2: day15_R2.fq.gz
    barcodes:
      sample:
        bc_len: 4
        bc_start: 0
        hd: 1
        tag: SB
        first_pass: first_pass
        reverse_complement: true
      umi:
        bc_len: 10
        bc_start: 4
        tag: UM
      cell:
        whitelist: ligation_barcode_whitelist.txt
        bc_len: 8
        hd: 1
        tag: CB

  - id: day15
    modality: dna
    reads:
      i1: day15_DNA_I1.fq.gz
      i2: day15_DNA_I2.fq.gz
      r1: day15_DNA_R1.fq.gz
      r2: day15_DNA_R2.fq.gz
    barcodes:
      sample:
        bc_len: 4
        bc_start: 14
        hd: 1
        tag: SB
        first_pass: first_pass
        reverse_complement: true
      modality:
        whitelist: dna_modality_barcode_whitelist.txt
        bc_len: 8
        bc_start: 18
        hd: 1
        tag: MO
        first_pass: not_first_pass
        reverse_complement: true
      cell:
        whitelist: ligation_barcode_whitelist.txt
        bc_len: 8
        hd: 1
        tag: CB
