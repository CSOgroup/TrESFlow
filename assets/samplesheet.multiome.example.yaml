library_name: TESTLIB_MULTIOME
sb_group_map: testdata/test_multiome_sb_group_map.tsv
dna_mo_map: testdata/test_multiome_mo_map.tsv

samples:
  - id: test_multiome
    modality: rna
    reads:
      i1: testdata/test_rna_I1.fastq
      r1: testdata/test_rna_R1.fastq
      r2: testdata/test_rna_R2.fastq
    barcodes:
      sample:
        bc_len: 4
        bc_start: 0
        hd: 1
        tag: SB
        first_pass: first_pass
        reverse_complement: true
      umi:
        bc_len: 10
        bc_start: 4
        tag: UM
      cell:
        whitelist: testdata/cell_whitelist.txt
        bc_len: 8
        hd: 1
        tag: CB

  - id: test_multiome
    modality: dna
    reads:
      i1: testdata/test_dna_I1.fastq
      i2: testdata/test_dna_I2.fastq
      r1: testdata/test_dna_R1.fastq
      r2: testdata/test_dna_R2.fastq
    barcodes:
      sample:
        bc_len: 4
        bc_start: 14
        hd: 1
        tag: SB
        first_pass: first_pass
        reverse_complement: true
      modality:
        whitelist: testdata/test_dna_modality_whitelist.txt
        bc_len: 8
        bc_start: 18
        hd: 1
        tag: MO
        first_pass: not_first_pass
        reverse_complement: true
      cell:
        whitelist: testdata/test_dna_ligation_whitelist.txt
        bc_len: 8
        hd: 1
        tag: CB
