library_name: TESTLIB

runtime:
  env_prefix: /home/annan/micromamba/envs/tres
  tmpdir: /tmp/TrESFlow_test_single_missing_i2_tmp

references:
  species: human
  root: ../../assets/testdata/TrESFlow_References
  ligation_barcode_whitelist: ../../assets/testdata/TrESFlow_References/ligation_barcode_whitelist.txt
  dna_ref_dir: ../../assets/testdata/TrESFlow_References/dna/human/bwa
  dna_blacklist_bed: ../../assets/testdata/TrESFlow_References/dna/human/blacklist.bed
  dna_chrom_sizes: ../../assets/testdata/TrESFlow_References/dna/human/chrom.sizes
  dna_effective_genome_size: 12

samples:
  single_missing_i2:
    groups:
      Normal:
        sb_barcodes: [CAGT]

    dna:
      tagmentation: single
      reads:
        i1: ../../assets/testdata/test_dna_I1.fastq
        r1: ../../assets/testdata/test_dna_R1.fastq
        r2: ../../assets/testdata/test_dna_R2.fastq
      mark_barcodes:
        H3K27ac: AGGCTATA
